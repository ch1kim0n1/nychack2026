version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: civiclens-db
    environment:
      POSTGRES_USER: civiclens
      POSTGRES_PASSWORD: civiclens
      POSTGRES_DB: civiclens
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civiclens"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
